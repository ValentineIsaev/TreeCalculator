<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"> 
        <title>Главная страница</title>
    </head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #c3d4e0 0%, #a5b9cc 100%);
            color: #2c3e50;
            padding: 10px;
        }

        .headButton {
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            padding: 10px 30px 10px 30px;

            border: none;
            cursor: pointer; 

            font-size: 23px;
        }

        .static-button {
            color: #0b80d4;
        }

        .push-button{
            color: #dae1e5;
            background-color: #075287;
        }
        
        .main-field {
            border: 5px solid #075287; 
            backdrop-filter: blur(10px);
            height: calc(100vh - 130px);
            display: grid;
            grid-template-columns: 3fr 1fr;
            position: relative;
            z-index: 1;
        }

        .left-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .name-window {
            font-size: 45px;
            color: #dae1e5;
            background-color: #075287;
            padding: 20px 100% 15px 20px; 
            display: inline-block;
            min-width: 250px;
        }

        .name-state {
            font-size: 20px;
            background: #075287;
            color: #dae1e5;
            width: 90%;
            padding: 8px 15px;
            clip-path: polygon(0% 0%, 100% 0%, 95% 100%, 0% 100%);
            margin-top: 2px;
        }

        .name-grid {
            display: grid;
            grid-template-columns: auto 1fr; /* Изменил на auto */
            flex-shrink: 0;
            align-items: start; /* Выравнивание по верхнему краю */
        }

        .info {
            border: 5px solid #075287;
            box-sizing: border-box; 
            height: 100%;
            padding: 10px;
        }

        .info-name{
            text-align: center;
            font-size: 25px;
            margin-bottom: 15px;
        }

        .tree-field-container {
            flex: 1;
            min-height: 0;
            padding: 10px;
        }

        .tree-field {
            width: 100%;
            height: 100%;
            border: 5px solid #075287;
            background: rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        /* Стили для списка деревьев */
        .tree-list {
            list-style: none;
            padding: 10px;
        }

        .tree-item {
            margin-bottom: 8px;
            border-radius: 5px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .tree-button {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            background: white;
            border: 2px solid #075287;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            color: #2c3e50;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tree-button:hover {
            background: #075287;
            color: #dae1e5;
            transform: translateX(5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .tree-button.selected {
            background: #075287;
            color: #dae1e5;
            border-color: #0b80d4;
            box-shadow: 0 4px 12px rgba(7, 82, 135, 0.5);
        }

        .tree-icon {
            font-size: 24px;
            width: 30px;
            text-align: center;
        }

        .tree-info {
            flex: 1;
        }

        .tree-name {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .tree-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        .tree-button:active {
            transform: scale(0.98);
        }

        /* Кастомный скроллбар */
        .tree-field::-webkit-scrollbar {
            width: 10px;
        }

        .tree-field::-webkit-scrollbar-track {
            background: rgba(7, 82, 135, 0.1);
            border-radius: 5px;
        }

        .tree-field::-webkit-scrollbar-thumb {
            background: #075287;
            border-radius: 5px;
        }

        .tree-field::-webkit-scrollbar-thumb:hover {
            background: #0b80d4;
        }

        /* Стили для правой панели */
        .tree-details {
            display: none;
            margin-top: 15px;
        }

        .tree-details.active {
            display: block;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
        }

        .detail-title {
            font-size: 20px;
            font-weight: bold;
            color: #075287;
            margin-bottom: 10px;
        }
    </style>
    <body>
        <div>
            <a href="main.html"><button class="headButton static-button">Главная</button></a>
            <button class="headButton push-button">Симуляция</button>
            <button class="headButton static-button">Калькулятор</button>
            <button class="headButton static-button">Редактор</button>
            <button class="headButton static-button">Справочник</button>
        
            <div class="main-field">
                <div class="left-container">
                    <div class="name-grid">
                        <div>
                            <div class="name-window">Симуляция</div>
                            <div class="name-state">Помощь</div>
                        </div>
                        <div></div>
                    </div>
                    
    </body>
</html>
