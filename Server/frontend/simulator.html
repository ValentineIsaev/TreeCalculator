<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"> 
        <title>Главная страница</title>
    </head>
    <style>
        body {
            background: linear-gradient(135deg, #c3d4e0 0%, #a5b9cc 100%);
            color: #2c3e50;
        }

        .headButton {
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            padding: 10px 30px 10px 30px;

            border: none;
            cursor: pointer; 

            font-size: 23px;
        }

        .static-button {
            color: #0b80d4;
        }

        .push-button{
            color: #dae1e5;
            background-color: #075287;
        }
        
        .main-field {
            border: 5px solid #075287; 
            backdrop-filter: blur(10px);
            height: 92vh; 
            display: grid;
            grid-template-columns: 1fr 5fr;
            /* flex-direction: column; */
            /* grid-template-rows: 1fr; */
        }

        .name-window {
            font-size: 45px;
            flex-shrink: 0;
            width: 100%;
            color: #dae1e5;
            background-color: #075287;
            padding: 
                    20px   /* up */
                    0%   /* right */
                    15px   /* down */ 
                    5px;  /* left */ 
            /* clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%); */
            display: inline-block;

            /* border-left: 0 solid transparent;
            border-right: 50px solid transparent;
            border-image: linear-gradient(135deg, transparent 0%, #075287 30%);
            border-image-slice: 1; */
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        select {
            width: 250px;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #075287;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }

        .field-gride {
            display: grid;
            grid-template-columns: 1fr 5fr;
            gap: 20px;
            flex: 1;
            min-height: 0
        }

        .menu {
            position: relative;
            display: inline-block;
        }

        .menu-button {
            background: #075287;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .menu-items {
            display: none;
            position: absolute;
            background: white;
            min-width: 100%;
            margin-top: -2px;
            z-index: 9999;

        }

        .menu:hover .menu-items {
            display: block;
        }

        .menu-items a {
            display: block;
            padding: 11px 20px;
            text-decoration: none;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
        }

        .menu-items a:hover {
            background: #e3f2fd;
        }

        input[type=range] {
            -webkit-appearance: slider-vertical; 
            transform-origin: left bottom;
            margin-left: 20px;
            margin-top: 400px;
            margin-bottom: 7px;
            width: 400px;
            height: 13px; 
            border-radius: 5px;
            border-image: #075287;
            background: linear-gradient(90deg, #a1a1a1 0%, #c0c0c0 50%, #a1a1a1 100%);  
        }

        input[type=range]::-webkit-slider-thumb {
            border-image: #075287;
            -webkit-appearance: none;
            width: 45px;
            height: 45px;
            border-radius: 0%;
            border: 500px solid #888;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: linear-gradient(to right, #075287, #075287) 0% / var(--fill, 0%) no-repeat #ddd;
            border-radius: 4px;
        }
        
        .settings {
            margin-top: 15px;
            display: flex
        }

        .wind-slider {
            padding: 0px 10px 10px 15px;
        }

        .main-menu {
            margin-left: -300px;
        }

        .controll-button-text {
            margin-top: 50px;
            margin-bottom: 50px;
            font-size: 22px;

            display: flex;
            align-items: center;
            gap: 15px;
        }


        .button-icon {
            width: 40px;
            height: 40px;

            display: block;
        }

        .button {
            background-color: transparent;
            border: transparent;
            cursor: pointer;
            transition: all 0.1s ease; 
        }

        .button:active {
            transform: scale(0.95);
            opacity: 0.7;
        }
                
        .button:hover {
            opacity: 0.8;
        }

        .circle-on {
            width: 10px;
            height: 10px;
            border: 3px solid black;
            border-radius: 50%;
            background: green;
        }

        .circle-off {
            width: 10px;
            height: 10px;
            border: 3px solid black;
            border-radius: 50%;
            background: red;
        }

        .console {
            /* padding-top: auto; */
            padding-top: -200px;
            height: 19%;
            width: 400px;
            border: 4px solid #075287;
            overflow-y: auto; 
            border-radius: 7px;
            background-color: black;
            list-style-type: none; 
        }

        .console-text-error {
            color: red;
            font-size: 20px;
        }

        .console-text {
            color: white;
            font-size: 20px;
        }

        .console-text-done {
            color: green;
            font-size: 20px;
        }

        .simulator-field {
            /* margin-top: auto; */
            background-color: #7fc4f5;
            height: 100%;
                box-sizing: border-box; 
            border: 4px solid  #075287;

            display: grid;
            grid-template-columns: 3fr 2fr;

        }

        .left-column {
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 6px solid  #075287;
            box-sizing: border-box; 
        }

        .simulator-data {
            padding: 10px;
            padding-top: 10px;
            /* padding-left: 15px; */
            font-size: 30px;
            color: #dae1e5;

            background-color: #075287;
            
        }

        .air {
            flex: 1;
        }

        .grass {
            width: 100%;
            height: 10px;
            /* padding-bottom: 50px; */
            background-color: #12b836;
        }

        .soil {
            margin-top: auto;
            background-color: #2e220b;
            padding-top: 2%;
            padding-bottom: 3%;

            font-size: 27px;
            padding-left: 2%;
            text-align: left;
            color: #1ca36b;
        }

    </style>
    <body>
        <div>
            <a href="main.html"><button class="headButton static-button">Главная</button></a>
            <button class="headButton push-button">Симуляция</button>
            <button class="headButton static-button">Калькулятор</button>
            <button class="headButton static-button">Редактор</button>
            <button class="headButton static-button">Справочник</button>
            <div class="main-field">
                        <div>
                            <div class="name-window">Симуляция</div>
                            <br>
                            <div class="menu">
                                <button class="menu-button">Установить настройки</button>
                                <div class="menu-items">
                                    <a href="set_tree.html">Установить дерево</a>
                                    <a href="set_soil.html">Установить почву</a>
                                </div>
                            </div> 
                            <br>
                            <div class="menu">
                                <button class="menu-button">Симулятор</button>
                                <div class="menu-items">
                                    <a href="main.html">Очиститить</a>
                                </div>
                            </div>
                            <br>
                            <div class="settings">
                                <div class="wind-slider">
                                    <span style="color: #075287; font-weight: bold;">100, М/С</span>
                                    <br>
                                    <input id="mySlider" type="range" style="transform: rotate(-90deg);" min="0" max="100" value="50">
                                    <br>
                                    <span id="sliderValue" style="color: #075287; font-weight: bold;">50, М/С</span>
                                </div>
                                <div class="main-menu">
                                    <div class="controll-button-text">
                                        <div class="circle-off"></div>    
                                        Cтарт <button class="button"><img class="button-icon" src="./UEBNAyGb.png"></button>
                                    </div>
                                    <div class="controll-button-text">
                                        <div class="circle-on"></div>Пауза
                                    </div>
                                    <div class="controll-button-text">
                                        <div class="circle-off"></div>Стоп
                                    </div>
                                </div>
                            </div>
                            <ul class="console">
                                <li class="console-text-error">Simul error: the tree is empty</li>
                                <li class="console-text">Retry.....</li>
                                <li class="console-text-done">Simulator is done and you can start!</li>
                            </ul>
                        </div>
                    <div class="simulator-field">
                        <div class="left-column">
                            <div class="simulator-data">Установленное дерево: Дуб<br>Почва проростания: Черзнозем<br>Тип почвы: Поверхностная</div>
                            <div class="air"></div>
                            <div class="grass"></div>
                            <div class="soil">Чернозем</div>
                        </div>
                        <p>hdggjds;lfkjglkdf</p>
                    </div>
            </div>
        </div>
    </body>
    <script>
    const slider = document.getElementById('mySlider');
    const valueDisplay = document.getElementById('sliderValue');
    
    slider.oninput = function() {
        valueDisplay.textContent = this.value + ", М/С";
    }
</script>    
</html>
