<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"> 
        <title>Главная страница</title>
        <link rel="stylesheet" href="../css/main.css">
        <link rel="stylesheet" href="../css/set-soil.css">
    </head>
    <body>
        <header>
            <div class="header-container">
                <a href="index.html"><button class="head-button static-head-button">Главная</button></a>
                <a href="simulator.html"><button class="head-button push-head-button">Симуляция</button></a>
                <a href="calculator.html"><button class="head-button static-head-button">Калькулятор</button></a>
                <a href="editor.html"><button class="head-button static-head-button">Редактор</button></a>
                <a href="helper.html"><button class="head-button static-head-button">Справочник</button></a>
                <span class="lyceum">Престиж, 2026</span>
            </div>
        </header>
        <div class="main-container">
            <div class="set-soil-container">
                <div class="name-container">
                    <div class="window-name">Симуляция</div>
                    <div class="window-subname">Установка почвы</div>
                </div>
                <div class="soils-container" id="SoilList">
                </div>
                <button class="back-button" onclick="window.location.href='simulator.html'">Выход</button> 
            </div>
        </div>
    </body>
    <script>
        fetch("http://127.0.0.1:5000/get-soils").then(response => response.json()).then(data => {
            const soilList = document.getElementById("SoilList");
            for (const soilId in data){
                soilList.insertAdjacentHTML('beforeend', `
                <button class="soil-button" onclick=setSoil(`+soilId+`,`+`'`+data[soilId]['name']+`'`+`)>
                    <div class="soil-button-container">
                        <div class="soil-header"></div>
                        <div class="soil-name">`+data[soilId]['name']+`</div>
                        <div class="soil-c">σ=`+data[soilId]['c']+`</div>
                    </div>
                </button>
                `);
                                        }
        });
        function setSoil(soilId, soilName) {
            sessionStorage.setItem("SoilId", soilId);
            sessionStorage.setItem("SoilName", soilName);
            window.location.href = "simulator.html";
        };
    </script>
</html>
